# ===== NGINX CONFIGURATION =====
# API Gateway - Điều hướng tất cả request đến các microservice

# NOTE: Upstreams are commented out to allow Nginx to start even if services are down.
# We use variables in proxy_pass to force late DNS resolution.

# upstream core_service {
#     server core-service:8081;
# }
# ... (other upstreams omitted for resilience)

# Main Server Block
server {
    listen 80;
    server_name localhost;

    # Docker DNS Resolver (Required for dynamic proxy_pass)
    resolver 127.0.0.11 valid=30s;

    # ===== LOGGING =====
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # ===== CORE SERVICE ROUTES =====
    location ~ ^/api/v1/(auth|user|patient) {
        set $core_upstream core-service:8081;
        proxy_pass http://$core_upstream;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ===== IOT SERVICE ROUTES =====
    location ~ ^/api/v1/(tracking|device|sensor) {
        set $iot_upstream iot-service:8082;
        proxy_pass http://$iot_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ===== AI SERVICE ROUTES =====
    location ~ ^/api/v1/(analysis|predict|report) {
        set $ai_upstream ai-service:8000;
        proxy_pass http://$ai_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ===== NOTIFICATION SERVICE ROUTES =====
    location ~ ^/api/v1/(notify|alerts|reminders) {
        set $notif_upstream notification-service:8084;
        proxy_pass http://$notif_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ===== GRAFANA DASHBOARD =====
    location /grafana/ {
        set $grafana_upstream grafana:3000;
        proxy_pass http://$grafana_upstream/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== HEALTH CHECK =====
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ===== ROOT =====
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ =404;
    }

    # ===== ERROR HANDLING =====
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}

# ===== NGINX CONFIGURATION =====
# API Gateway - Điều hướng tất cả request đến các microservice

# NOTE: Upstreams are commented out to allow Nginx to start even if services are down.
# We use variables in proxy_pass to force late DNS resolution.

# upstream core_service {
#     server core-service:8081;
# }
# ... (other upstreams omitted for resilience)

# Main Server Block
server {
    listen 80;
    server_name localhost;
    client_max_body_size 10M;

    # Docker DNS Resolver (Required for dynamic proxy_pass)
    resolver 127.0.0.11 valid=30s;

    # ===== LOGGING =====
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # ===== CORE SERVICE ROUTES =====

    # Internal Auth Validation Endpoint
    location = /_auth_validate {
        internal;
        set $core_upstream core-service:8081;
        proxy_pass http://$core_upstream/api/v1/auth/validate;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Authorization $http_authorization; 
    }

    # Public Routes (Auth)
    location ~ ^/api/v1/auth {
        set $core_upstream core-service:8081;
        proxy_pass http://$core_upstream;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Protected Routes (Users, Medical Records, Health, Meals, Sleep, Water Intake, Sessions)
    location ~ ^/api/v1/(users|medical|health|meals|food|sessions|sleep|water-intake) {
        auth_request /_auth_validate;
        auth_request_set $x_user_id $upstream_http_x_user_id;

        set $core_upstream core-service:8081; # Docker internal DNS
        # set $core_upstream host.docker.internal:8081; # For local dev without Docker network

        proxy_pass http://$core_upstream;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header x-user-id $x_user_id;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ===== IOT SERVICE ROUTES =====
    location ~ ^/api/v1/(tracking|device|sensor|activities|steps|exercise|gps|schedules|water) {
        auth_request /_auth_validate;
        auth_request_set $x_user_id $upstream_http_x_user_id;

        set $iot_upstream iot-service:8082;
        proxy_pass http://$iot_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header x-user-id $x_user_id;
        proxy_set_header Authorization $http_authorization;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ===== BFF ROUTES (MOBILE) =====
    location ~ ^/api/v1/bff/mobile {
        auth_request /_auth_validate;
        auth_request_set $x_user_id $upstream_http_x_user_id;

        set $bff_upstream bff-service:8090;
        proxy_pass http://$bff_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header x-user-id $x_user_id;
        proxy_set_header x-correlation-id $request_id;
        proxy_set_header Authorization $http_authorization;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ===== AI SERVICE ROUTES =====
    location ~ ^/api/v1/(analysis|predict|report) {
        auth_request /_auth_validate;
        auth_request_set $x_user_id $upstream_http_x_user_id;

        set $ai_upstream ai-service:8000;
        proxy_pass http://$ai_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header x-user-id $x_user_id;
        proxy_set_header Authorization "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ===== NOTIFICATION SERVICE ROUTES (new API) =====
    location ~ ^/api/v1/notifications {
        auth_request /_auth_validate;
        auth_request_set $x_user_id $upstream_http_x_user_id;

        set $notif_upstream notification-service:8084;
        proxy_pass http://$notif_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header x-user-id $x_user_id;
        proxy_set_header Authorization "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ===== NOTIFICATION SERVICE ROUTES (legacy) =====
    location ~ ^/api/v1/(notify|alerts|reminders) {
        auth_request /_auth_validate;
        auth_request_set $x_user_id $upstream_http_x_user_id;

        set $notif_upstream notification-service:8084;
        proxy_pass http://$notif_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header x-user-id $x_user_id;
        proxy_set_header Authorization "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ===== GRAFANA DASHBOARD =====
    location /grafana/ {
        set $grafana_upstream grafana:3000;
        proxy_pass http://$grafana_upstream/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== HEALTH CHECK =====
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ===== ROOT =====
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ =404;
    }

    # ===== ERROR HANDLING =====
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}

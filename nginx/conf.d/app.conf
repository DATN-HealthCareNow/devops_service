# ===== NGINX CONFIGURATION =====
# API Gateway - Điều hướng tất cả request đến các microservice

upstream core_service {
    server core-service:8081;
}

upstream iot_service {
    server iot-service:8082;
}

upstream ai_service {
    server ai-service:8000;
}

upstream notif_service {
    server notification-service:8084;
}

upstream grafana {
    server grafana:3000;
}

# HTTP Server - Redirect to HTTPS (nếu cần, bỏ qua comment nếu chỉ dùng HTTP)
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

# Main Server Block
server {
    listen 80;
    server_name localhost;

    # ===== LOGGING =====
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # ===== CORE SERVICE ROUTES =====
    # Đường dẫn: /api/v1/auth, /api/v1/user, /api/v1/patient
    location ~ ^/api/v1/(auth|user|patient) {
        proxy_pass http://core_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ===== IOT SERVICE ROUTES =====
    # Đường dẫn: /api/v1/tracking, /api/v1/device, /api/v1/sensor
    location ~ ^/api/v1/(tracking|device|sensor) {
        proxy_pass http://iot_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ===== AI SERVICE ROUTES =====
    # Đường dẫn: /api/v1/analysis, /api/v1/predict, /api/v1/report
    location ~ ^/api/v1/(analysis|predict|report) {
        proxy_pass http://ai_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ===== NOTIFICATION SERVICE ROUTES =====
    # Đường dẫn: /api/v1/notify, /api/v1/alerts, /api/v1/reminders
    location ~ ^/api/v1/(notify|alerts|reminders) {
        proxy_pass http://notif_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ===== GRAFANA DASHBOARD =====
    # Đường dẫn: /grafana
    location /grafana/ {
        proxy_pass http://grafana/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== HEALTH CHECK =====
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ===== ROOT =====
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ =404;
    }

    # ===== ERROR HANDLING =====
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}

# Prometheus Configuration File
# ===== GLOBAL SETTINGS =====
global:
  scrape_interval: 15s # Thu thập dữ liệu mỗi 15 giây
  evaluation_interval: 15s # Đánh giá rules mỗi 15 giây
  external_labels:
    cluster: "healthcare-now"
    environment: "development"

# ===== ALERTMANAGER CONFIGURATION =====
# (Uncomment khi cần cảnh báo)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#             - alertmanager:9093

# ===== SCRAPE CONFIGURATIONS =====
scrape_configs:
  # ===== PROMETHEUS ITSELF =====
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
    scrape_interval: 5s
    scrape_timeout: 5s

  # ===== CORE SERVICE =====
  - job_name: "core-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["core-service:8081"]
    scrape_interval: 15s
    scrape_timeout: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "core-service"

  # ===== IOT SERVICE =====
  - job_name: "iot-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["iot-service:8082"]
    scrape_interval: 15s
    scrape_timeout: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "iot-service"

  # ===== AI SERVICE (FastAPI) =====
  - job_name: "ai-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["ai-service:8000"]
    scrape_interval: 15s
    scrape_timeout: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "ai-service"

  # ===== NOTIFICATION SERVICE =====
  - job_name: "notification-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["notification-service:8084"]
    scrape_interval: 15s
    scrape_timeout: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "notification-service"

  # ===== DOCKER DAEMON METRICS =====
  # (Nếu sử dụng cAdvisor để monitor Docker)
  # - job_name: 'cadvisor'
  #   static_configs:
  #     - targets: ['cadvisor:8080']
  #   scrape_interval: 15s

  # ===== NODE EXPORTER METRICS =====
  # (Nếu sử dụng Node Exporter để monitor server)
  # - job_name: 'node-exporter'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
  #   scrape_interval: 15s

  # ===== MONGODB METRICS =====
  # (Nếu có MongoDB Exporter)
  # - job_name: 'mongodb'
  #   static_configs:
  #     - targets: ['mongodb-exporter:9216']
  #   scrape_interval: 30s

  # ===== REDIS METRICS =====
  # (Nếu có Redis Exporter)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
  #   scrape_interval: 30s

  # ===== POSTGRESQL METRICS =====
  - job_name: "postgresql"
    static_configs:
      - targets: ["postgres-exporter:9187"]
    scrape_interval: 15s


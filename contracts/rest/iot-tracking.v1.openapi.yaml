openapi: 3.0.3
info:
  title: HealthCareNow IoT Tracking API
  version: 1.0.0
  description: Contract-first definition for IoT tracking endpoints used by mobile clients.
servers:
  - url: http://localhost:8082
paths:
  /api/v1/tracking/health-sync:
    post:
      summary: Upsert daily health metrics
      operationId: upsertDailyHealth
      parameters:
        - in: header
          name: x-user-id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HealthSyncRequest'
      responses:
        '200':
          description: Upserted daily health document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyHealthResponse'
components:
  schemas:
    HealthSyncRequest:
      type: object
      required: [date_string, raw_date, source, metrics]
      properties:
        user_id:
          type: string
          description: Optional on wire; backend trusts x-user-id header.
        date_string:
          type: string
          pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'
        raw_date:
          type: string
          format: date-time
        source:
          type: string
        metrics:
          $ref: '#/components/schemas/DailyHealthMetrics'
    DailyHealthMetrics:
      type: object
      properties:
        steps:
          type: number
          format: double
        exercise_minutes:
          type: integer
        active_calories:
          type: integer
        resting_calories:
          type: integer
        sleep_minutes:
          type: integer
        water_consumed_ml:
          type: integer
        heart_rate:
          type: integer
    DailyHealthResponse:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        date_string:
          type: string
        raw_date:
          type: string
        source:
          type: string
        metrics:
          $ref: '#/components/schemas/DailyHealthMetrics'

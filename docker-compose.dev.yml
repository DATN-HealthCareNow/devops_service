version: '3.8'

# =========================================================
# 🏗️ DEVELOPMENT ENVIRONMENT (INFRASTRUCTURE ONLY)
# ---------------------------------------------------------
# Includes: Databases (Mongo), Message Broker (RabbitMQ), Cache (Redis), API Gateway (Nginx)
# Excludes: Heavy Monitoring Stack (Prometheus, Grafana) - Use docker-compose.monitoring.yml for that.
# =========================================================

services:
  # ===== DATABASES (4 Logical DBs) =====
  core_db:
    image: mongo:7.0
    container_name: core_db
    restart: always
    environment:
      MONGO_INITDB_DATABASE: healthcare_core
    volumes:
      - core_data:/data/db
    networks:
      - healthcare-network
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.runCommand(\"ping\").ok' --quiet"]
      interval: 10s
      timeout: 5s
      retries: 5

  iot_db:
    image: mongo:7.0
    container_name: iot_db
    restart: always
    environment:
      MONGO_INITDB_DATABASE: healthcare_iot
    volumes:
      - iot_data:/data/db
    networks:
      - healthcare-network
    ports:
      - "27018:27017"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.runCommand(\"ping\").ok' --quiet"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai_db:
    image: mongo:7.0
    container_name: ai_db
    restart: always
    environment:
      MONGO_INITDB_DATABASE: healthcare_ai
    volumes:
      - ai_data:/data/db
    networks:
      - healthcare-network
    ports:
      - "27019:27017"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.runCommand(\"ping\").ok' --quiet"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification_db:
    image: mongo:7.0
    container_name: notification_db
    restart: always
    environment:
      MONGO_INITDB_DATABASE: healthcare_notification
    volumes:
      - notification_data:/data/db
    networks:
      - healthcare-network
    ports:
      - "27020:27017"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.runCommand(\"ping\").ok' --quiet"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== CACHE & MESSAGING =====
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - healthcare-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - healthcare-network
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ===== API GATEWAY =====
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx
    restart: always
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/html:/usr/share/nginx/html
    networks:
      - healthcare-network
    depends_on:
      core_db:
        condition: service_started
      rabbitmq:
        condition: service_started
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ===== MICROSERVICES =====
  notification-service:
    build: 
      context: ../notification-service
    container_name: notification-service
    restart: always
    ports:
      - "8084:8084"
    env_file:
      - .env
    environment:
      SPRING_DATA_MONGODB_URI: ${MONGO_NOTIFICATION_URI:-mongodb://notification_db:27017/healthcare_notification}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_REDIS_HOST: redis
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      APP_INTERNAL_TOKEN: ${APP_INTERNAL_TOKEN:-hcn-internal-secret-2024}
      CORE_SERVICE_URL: ${CORE_SERVICE_URL:-http://core-service:8081}
    depends_on:
      - notification_db
      - rabbitmq
      - redis
    networks:
      - healthcare-network

  bff-service:
    build:
      context: ../bff-service
      dockerfile: Dockerfile
    container_name: bff-service
    restart: always
    ports:
      - "8090:8090"
    environment:
      PORT: 8090
      CORE_BASE_URL: http://core-service:8081
      IOT_BASE_URL: http://iot-service:8082
    depends_on:
      - core-service
      - iot-service
    networks:
      - healthcare-network

# ===== NETWORKS & VOLUMES =====
networks:
  healthcare-network:
    driver: bridge

volumes:
  core_data:
    driver: local
  iot_data:
    driver: local
  ai_data:
    driver: local
  notification_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
